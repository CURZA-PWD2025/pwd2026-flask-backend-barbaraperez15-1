services:
  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "5001:5000"
    volumes:
      - ./:/app
    networks:
      - pwd_network

  db:
    image: postgres:15
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pwd_network

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - ./.env
    ports:
      - "5050:80"
    environment:
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pwd_network

volumes:
  pgdata:
  pgadmin_data:

networks:
  pwd_network:
    driver: bridge
